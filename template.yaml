AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Secure VPC + EC2 baseline for learning and demos.
  Defaults to SSM Session Manager access (no open inbound ports).
  Optional SSH ingress is scoped to a CIDR parameter, never 0.0.0.0/0.
  AMI is resolved at deploy time via an SSM public parameter (no hardcoding).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment, used for resource naming and tagging.

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-9]|3[0-2]))$'
    Description: CIDR block for the VPC.

  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-9]|3[0-2]))$'
    Description: CIDR block for the single public subnet.

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t4g.micro]
    Description: EC2 instance type (t3.micro is free-tier eligible).

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI, resolved from the SSM public parameter store at deploy time.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    Description: >-
      Optional SSH keypair. Leave empty to rely on SSM Session Manager only
      (recommended - no inbound port 22 required).

  EnableSSHAccess:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: If 'true', opens port 22 from AllowedSSHCidr. Default is SSM-only.

  AllowedSSHCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-9]|3[0-2]))$'
    Description: >-
      CIDR allowed to reach port 22 when EnableSSHAccess=true.
      Defaults to the VPC range (NOT 0.0.0.0/0). Tighten to your own IP in real use.

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  ShouldCreateSSHIngress: !Equals [!Ref EnableSSHAccess, 'true']

Resources:
  BaselineVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-vpc'}
        - {Key: Environment, Value: !Ref Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-igw'}

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref BaselineVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BaselineVPC
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-public-subnet'}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaselineVPC
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-rt'}

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # IAM role lets the instance be reached via SSM Session Manager
  # without exposing port 22 to the internet.
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-ssm-role'}

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref SSMInstanceRole]

  BaselineSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_23
            comment: >-
              No ingress rules by design (SSM-only access via port 443).
              When EnableSSHAccess=true the single opt-in SSH rule carries a description.
    Properties:
      GroupDescription: >-
        Baseline SG. No inbound rules by default (SSM-only access via port 443).
        SSH is opt-in and scoped to a CIDR.
      VpcId: !Ref BaselineVPC
      SecurityGroupIngress:
        - !If
          - ShouldCreateSSHIngress
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSSHCidr
            Description: !Sub 'SSH from ${AllowedSSHCidr} (opt-in, not world-open)'
          - !Ref 'AWS::NoValue'
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-sg'}

  BaselineEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref BaselineSecurityGroup]
      IamInstanceProfile: !Ref SSMInstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      Tags:
        - {Key: Name, Value: !Sub '${Environment}-baseline-ec2'}

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref BaselineVPC
    Export: {Name: !Sub '${Environment}-BaselineVpcId'}
  PublicSubnetId:
    Description: Public subnet ID
    Value: !Ref PublicSubnet
  SecurityGroupId:
    Description: Security group ID
    Value: !Ref BaselineSecurityGroup
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref BaselineEC2Instance
  InstancePublicIp:
    Description: Public IP assigned on launch
    Value: !GetAtt BaselineEC2Instance.PublicIp
